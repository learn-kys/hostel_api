services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hostel-app:latest
    container_name: hostel-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://hostel_user:hostel_password@db:5432/hostel_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: hostel-db
    environment:
      - POSTGRES_USER=hostel_user
      - POSTGRES_PASSWORD=hostel_password
      - POSTGRES_DB=hostel_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostel_user -d hostel_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: